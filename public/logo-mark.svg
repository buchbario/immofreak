<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Laptop body -->
  <path d="M3 26h34l2 8c.2.8-.4 1.5-1.2 1.5H2.2c-.8 0-1.4-.7-1.2-1.5l2-8z" fill="#d4dbe4" stroke="#2d3a4a" stroke-width="0.8"/>
  <!-- Laptop screen back -->
  <rect x="6" y="13" width="28" height="14" rx="1.5" fill="#e8edf2" stroke="#2d3a4a" stroke-width="1"/>
  <!-- Blue dot on laptop -->
  <circle cx="20" cy="31" r="1.6" fill="#3b5bdb"/>

  <!-- Head (peeking over) -->
  <ellipse cx="20" cy="11" rx="8.5" ry="7" fill="#f5e0c8"/>

  <!-- Hair - messy spiky dark style -->
  <path d="M11 11c0-5 3-9 5-9.5-.5-1.5 1.5-2 2.5-.5.5-2 2.5-2 3-.5 1-1.5 2.5-1 3 .5 1.5-1 4.5 0.5 4.5 2 .5 1.5 2 3.5.5 6-.5 1-3 2-9 2s-8.5-1-9.5-2c-.5-.5-.5-1 0 1.5z" fill="#1e293b"/>

  <!-- Glasses -->
  <ellipse cx="16" cy="11" rx="3.8" ry="3.5" fill="white" stroke="#1e293b" stroke-width="1.4"/>
  <ellipse cx="24" cy="11" rx="3.8" ry="3.5" fill="white" stroke="#1e293b" stroke-width="1.4"/>
  <path d="M19.8 11h.4" stroke="#1e293b" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M12.2 10.5l-1.5-.5" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
  <path d="M27.8 10.5l1.5-.5" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="16" cy="11.2" r="1.8" fill="#1e293b"/>
  <circle cx="24" cy="11.2" r="1.8" fill="#1e293b"/>
  <!-- Eye highlights -->
  <circle cx="16.6" cy="10.5" r="0.6" fill="white"/>
  <circle cx="24.6" cy="10.5" r="0.6" fill="white"/>
</svg>